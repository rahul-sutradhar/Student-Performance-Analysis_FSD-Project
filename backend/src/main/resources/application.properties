spring.config.import=optional:file:../.env[.properties]

spring.application.name=student-performance-backend

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/student_performance_db}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

server.port=${SERVER_PORT:8080}

security.jwt.secret=${JWT_SECRET:student-performance-capstone-secret-key-2026}
security.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

app.admin.username=${APP_ADMIN_USERNAME:admin}
app.admin.password=${APP_ADMIN_PASSWORD:admin123}

springdoc.swagger-ui.path=/swagger-ui.html
