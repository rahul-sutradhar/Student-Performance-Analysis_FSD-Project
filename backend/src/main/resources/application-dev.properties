spring.datasource.url=${DEV_DB_URL:jdbc:h2:mem:studentdb;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=${DEV_DB_USERNAME:sa}
spring.datasource.password=${DEV_DB_PASSWORD:}

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.defer-datasource-initialization=true

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.sql.init.mode=always

security.jwt.secret=${JWT_SECRET:student-performance-capstone-secret-key-2026}
security.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

app.admin.username=${APP_ADMIN_USERNAME:admin}
app.admin.password=${APP_ADMIN_PASSWORD:admin123}
